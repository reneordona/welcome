<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome – Housing Authority of the City of Long Beach</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:  #05c3de;
      --banner: #de3c31;
      --white:  #ffffff;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--brand);
    }

    #halftone {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .screen {
      position: relative;
      z-index: 1;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 22px 36px 0;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
    }

    .logo-wrap img {
      height: 130px;
      width: auto;
      display: block;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.22));
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }
    .logo-text .t1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--white);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .logo-text .t2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.82);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── MAIN CENTER — left-aligned ── */
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 0 60px;
      line-height: 1.0;
      gap: 0;
    }

    .line-welcome,
    .line-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: clamp(3rem, 9vw, 9rem);
      text-transform: uppercase;
      text-align: left;
      letter-spacing: 0.02em;
    }

    .line-welcome {
      color: #000000;
      opacity: 0;
      animation: fadeUp 1s ease 0.3s forwards;
    }

    .line-sub {
      color: var(--white);
      opacity: 0;
      animation: fadeUp 1s ease 0.55s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── BANNER — fixed height ── */
    .banner-wrap {
      flex-shrink: 0;
      width: 100%;
      background: var(--banner);
      border-top: 3px solid rgba(255,255,255,0.3);
      height: 110px;
      position: relative;
      overflow: hidden;
    }

    .banner-slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 40px;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .banner-slide.active {
      opacity: 1;
    }

    .banner-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 2.4rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--white);
      text-align: center;
      text-shadow: 0 1px 4px rgba(0,0,0,0.2);
      white-space: nowrap;
    }

    /* progress dots */
    .banner-dots {
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: center;
      padding: 7px 0 9px;
      background: var(--banner);
    }
    .banner-dots span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.32);
      transition: background 0.4s ease, width 0.4s ease, border-radius 0.4s ease;
    }
    .banner-dots span.on {
      background: rgba(255,255,255,0.9);
      width: 28px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

<canvas id="halftone"></canvas>

<div class="screen">

  <div class="topbar">
    <div class="logo-wrap">
      <img src="https://raw.githubusercontent.com/reneordona/ha_elevator/main/Housing%20Authority%20Logo%20-%20Portrait%20Version-300dpi%20for%20Print-WHITE.png" alt="Housing Authority of the City of Long Beach" />
    </div>
  </div>

  <div class="center">
    <div class="line-welcome">Welcome</div>
    <div class="line-sub">Housing Authority of the City of Long Beach</div>
  </div>

  <div class="banner-wrap" id="banner">
    <div class="banner-slide active" id="slide-0">
      <div class="banner-text">The waiting list is currently closed</div>
    </div>
    <div class="banner-slide" id="slide-1">
      <div class="banner-text">La lista de espera está cerrada actualmente</div>
    </div>
    <div class="banner-slide" id="slide-2">
      <div class="banner-text">Sarado pa ang waiting list ngayon</div>
    </div>
    <div class="banner-slide" id="slide-3">
      <div class="banner-text">ការចុះបញ្ជីទទួលជំនួយ Section 8 ត្រូវបានបិទ ។</div>
    </div>
  </div>

  <div class="banner-dots" id="dots">
    <span class="on"></span><span></span><span></span><span></span>
  </div>

</div>

<script>
  /* ── HALFTONE ── */
  (function() {
    const canvas = document.getElementById('halftone');
    const ctx = canvas.getContext('2d');
    let W, H, dots;
    const GRID = 38;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      dots = [];
      const cols = Math.ceil(W / GRID) + 2;
      const rows = Math.ceil(H / GRID) + 2;
      for (let r = 0; r < rows; r++)
        for (let c = 0; c < cols; c++)
          dots.push({ x: c*GRID - GRID*.5, y: r*GRID - GRID*.5, phase: Math.random()*Math.PI*2 });
    }

    const centres = [
      { x:.25, y:.35, vx:.00018, vy:.00012 },
      { x:.72, y:.65, vx:-.00015, vy:-.00010 },
    ];
    let t = 0;

    function draw() {
      ctx.clearRect(0, 0, W, H);
      centres.forEach(c => {
        c.x += c.vx; c.y += c.vy;
        if (c.x<0||c.x>1) c.vx*=-1;
        if (c.y<0||c.y>1) c.vy*=-1;
      });
      t += 0.012;
      dots.forEach(d => {
        let inf = 0;
        centres.forEach(c => {
          const dx=d.x-c.x*W, dy=d.y-c.y*H;
          inf += Math.max(0, 1-Math.sqrt(dx*dx+dy*dy)/(Math.max(W,H)*.55));
        });
        inf = Math.min(inf, 1);
        const wave = Math.sin(t+d.phase)*.5+.5;
        const r = 1.5 + wave*10*inf + inf*4;
        ctx.beginPath();
        ctx.arc(d.x, d.y, Math.max(.5,r), 0, Math.PI*2);
        ctx.fillStyle = `rgba(3,143,163,${0.08+inf*0.13+wave*0.06})`;
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize(); draw();
  })();

  /* ── BANNER CYCLE ── */
  (function() {
    const slides = document.querySelectorAll('.banner-slide');
    const dots   = document.querySelectorAll('#dots span');
    let cur = 0;
    setInterval(() => {
      slides[cur].classList.remove('active');
      dots[cur].classList.remove('on');
      cur = (cur + 1) % slides.length;
      slides[cur].classList.add('active');
      dots[cur].classList.add('on');
    }, 4500);
  })();
</script>
</body>
</html>
